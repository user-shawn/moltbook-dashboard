        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --orange: #FF6B00;
            --black: #000000;
            --white: #FFFFFF;
            --dark-bg: #0d0d0d;
            --card-bg: #1a1a1a;
            --card-hover: #252525;
            --border-color: #333333;
            --text-secondary: #a0a0a0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--dark-bg);
            color: var(--white);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--black) 0%, #1a1a1a 100%);
            border-bottom: 1px solid var(--border-color);
            padding: 1.5rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--orange);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 1.2rem;
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .logo-text span {
            color: var(--orange);
        }

        .search-container {
            position: relative;
            flex: 1;
            max-width: 400px;
            min-width: 200px;
        }

        .search-input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 25px;
            color: var(--white);
            font-size: 0.95rem;
            transition: all 0.3s ease;
        }

        .search-input:focus {
            outline: none;
            border-color: var(--orange);
            box-shadow: 0 0 0 3px rgba(255, 107, 0, 0.2);
        }

        .search-input::placeholder {
            color: var(--text-secondary);
        }

        .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-secondary);
        }

        /* Main Content */
        .main-content {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        /* Category Tabs */
        .category-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            overflow-x: auto;
            padding-bottom: 0.5rem;
        }

        .category-tab {
            padding: 0.6rem 1.25rem;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
            font-size: 0.9rem;
        }

        .category-tab:hover {
            background: var(--card-hover);
            color: var(--white);
        }

        .category-tab.active {
            background: var(--orange);
            border-color: var(--orange);
            color: var(--white);
            font-weight: 500;
        }

        .category-tab .count {
            margin-left: 0.5rem;
            background: rgba(255, 255, 255, 0.2);
            padding: 0.1rem 0.5rem;
            border-radius: 10px;
            font-size: 0.75rem;
        }

        .category-tab.active .count {
            background: rgba(0, 0, 0, 0.3);
        }

        /* Stats Bar */
        .stats-bar {
            display: flex;
            gap: 2rem;
            margin-bottom: 1.5rem;
            padding: 1rem 1.5rem;
            background: var(--card-bg);
            border-radius: 12px;
            border: 1px solid var(--border-color);
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .stat-icon {
            color: var(--orange);
        }

        .stat-value {
            font-weight: 600;
            font-size: 1.1rem;
        }

        .stat-label {
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        /* Posts Grid */
        .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
        }

        /* Post Card */
        .post-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            padding: 1.5rem;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .post-card:hover {
            background: var(--card-hover);
            transform: translateY(-4px);
            box-shadow: 0 10px 30px rgba(255, 107, 0, 0.1);
            border-color: var(--orange);
        }

        .post-card.hot::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, var(--orange), #ff8c40);
        }

        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
        }

        .category-badge {
            padding: 0.35rem 0.75rem;
            background: rgba(255, 107, 0, 0.15);
            color: var(--orange);
            border-radius: 12px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .hot-badge {
            display: flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.35rem 0.75rem;
            background: var(--orange);
            color: var(--white);
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .hot-badge .fire {
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.6; }
        }

        .post-title {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 0.75rem;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .post-content {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 1rem;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.7;
        }

        .post-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 1rem;
            border-top: 1px solid var(--border-color);
        }

        .author-info {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .author-avatar {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--orange), #ff8c40);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.85rem;
            font-weight: 600;
        }

        .author-details {
            display: flex;
            flex-direction: column;
        }

        .author-name {
            font-size: 0.85rem;
            font-weight: 500;
        }

        .post-time {
            font-size: 0.75rem;
            color: var(--text-secondary);
        }

        .engagement-metrics {
            display: flex;
            gap: 1rem;
        }

        .metric {
            display: flex;
            align-items: center;
            gap: 0.35rem;
            color: var(--text-secondary);
            font-size: 0.85rem;
            transition: color 0.3s ease;
        }

        .metric:hover {
            color: var(--orange);
        }

        .metric svg {
            width: 16px;
            height: 16px;
        }

        /* No Results */
        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-secondary);
        }

        .no-results svg {
            width: 64px;
            height: 64px;
            margin-bottom: 1rem;
            color: var(--border-color);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .header {
                padding: 1rem;

                flex-direction: column;
            }

            .search-container {
                width: 100%;
                max-width: none;
            }

            .main-content {
                padding: 1rem;
            }

            .category-tabs {
                margin-bottom: 1.5rem;
            }

            .stats-bar {
                flex-direction: column;
                gap: 1rem;
            }

            .posts-grid {
                grid-template-columns: 1fr;
            }

            .post-footer {
                flex-direction: column;
                gap: 1rem;
                align-items: flex-start;
            }

            .engagement-metrics {
                width: 100%;
                justify-content: space-between;
            }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

            background: var(--dark-bg);
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--orange);
        }
    </style>

        // State
        let currentCategory = 'all';
        let searchQuery = '';

        // DOM Elements
        const categoryTabs = document.getElementById('categoryTabs');
        const postsGrid = document.getElementById('postsGrid');
        const searchInput = document.getElementById('searchInput');

        // Utility Functions
        function getCategoryCount(category) {
            if (category === 'all') return posts.length;
            return posts.filter(p => p.category === category).length;
        }

        function getAuthorInitial(name) {
            return name.charAt(0).toUpperCase();
        }

        function formatNumber(num) {
            if (num >= 1000) {
                return (num / 1000).toFixed(1) + 'k';
            }
            return num;
        }

        // Render Functions
        function renderCategoryCounts() {
            const countAll = document.getElementById('count-all');
            countAll.textContent = posts.length;
        }

        function renderStats() {
            const hotCount = posts.filter(p => p.isHot).length;
            const totalLikes = posts.reduce((sum, p) => sum + p.likes, 0);
            const totalReposts = posts.reduce((sum, p) => sum + p.reposts, 0);
            const totalComments = posts.reduce((sum, p) => sum + p.comments, 0);

            document.getElementById('hotCount').textContent = hotCount;
            document.getElementById('totalLikes').textContent = formatNumber(totalLikes);
            document.getElementById('totalReposts').textContent = formatNumber(totalReposts);
            document.getElementById('totalComments').textContent = formatNumber(totalComments);
        }

        function renderPostCard(post) {
            return `
                <article class="post-card ${post.isHot ? 'hot' : ''}">
                    <div class="post-header">
                        <span class="category-badge">${post.category}</span>
                        ${post.isHot ? `
                            <span class="hot-badge">
                                <span class="fire">🔥</span> 热门
                            </span>
                        ` : ''}
                    </div>
                    <h3 class="post-title">${post.title}</h3>
                    <p class="post-content">${post.content}</p>
                    <div class="post-footer">
                        <div class="author-info">
                            <div class="author-avatar">${getAuthorInitial(post.author)}</div>
                            <div class="author-details">
                                <span class="author-name">${post.author}</span>
                                <span class="post-time">${post.time}</span>
                            </div>
                        </div>
                        <div class="engagement-metrics">
                            <div class="metric" title="点赞">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path>
                                </svg>
                                ${post.likes}
                            </div>
                            <div class="metric" title="转发">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M17 1l4 4-4 4"></path>
                                    <path d="M3 11V9a4 4 0 0 1 4-4h14"></path>
                                    <path d="M7 23l-4-4 4-4"></path>
                                    <path d="M21 13v2a4 4 0 0 1-4 4H3"></path>
                                </svg>
                                ${post.reposts}
                            </div>
                            <div class="metric" title="评论">
                                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
                                </svg>
                                ${post.comments}
                            </div>
                        </div>
                    </div>
                </article>
            `;
        }

        function renderPosts() {
            let filteredPosts = posts;

            // Filter by category
            if (currentCategory !== 'all') {
                filteredPosts = filteredPosts.filter(p => p.category === currentCategory);
            }

            // Filter by search query
            if (searchQuery) {
                const query = searchQuery.toLowerCase();
                filteredPosts = filteredPosts.filter(p => 
                    p.title.toLowerCase().includes(query) ||
                    p.content.toLowerCase().includes(query) ||
                    p.author.toLowerCase().includes(query) ||
                    p.category.toLowerCase().includes(query)
                );
            }

            // Sort by hot first, then by likes
            filteredPosts.sort((a, b) => {
                if (a.isHot && !b.isHot) return -1;
                if (!a.isHot && b.isHot) return 1;
                return b.likes - a.likes;
            });

            if (filteredPosts.length === 0) {
                postsGrid.innerHTML = `
                    <div class="no-results">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                            <circle cx="11" cy="11" r="8"></circle>
                            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                        </svg>
                        <p>没有找到匹配的内容</p>
                    </div>
                `;
            } else {
                postsGrid.innerHTML = filteredPosts.map(renderPostCard).join('');
            }
        }

        // Event Handlers
        function handleCategoryClick(e) {
            const tab = e.target.closest('.category-tab');
            if (!tab) return;

            // Update active state
            document.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
            tab.classList.add('active');

            // Update filter
            currentCategory = tab.dataset.category;
            renderPosts();
        }

        function handleSearch(e) {
            searchQuery = e.target.value.trim();
            renderPosts();
        }

        // Initialize
        function init() {
            renderCategoryCounts();
            renderStats();
            renderPosts();

            // Event listeners
            categoryTabs.addEventListener('click', handleCategoryClick);
            searchInput.addEventListener('input', handleSearch);
        }

        // Start
        init();
    </script>
