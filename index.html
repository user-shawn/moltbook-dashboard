<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moltbook 热点仪表盘</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --orange: #FF6B00;
            --black: #000000;
            --white: #FFFFFF;
            --dark-bg: #0d0d0d;
            --card-bg: #1a1a1a;
            --card-hover: #252525;
            --border-color: #333333;
            --text-secondary: #a0a0a0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--dark-bg);
            color: var(--white);
            line-height: 1.6;
            min-height: 100vh;
        }

        .header {
            background: linear-gradient(135deg, var(--black) 0%, #1a1a1a 100%);
            border-bottom: 1px solid var(--border-color);
            padding: 1.5rem 2rem;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .logo-icon {
            font-size: 2rem;
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--white);
        }

        .logo-text span {
            color: var(--orange);
        }

        .search-container {
            flex: 1;
            max-width: 400px;
            min-width: 200px;
        }

        .search-input {
            width: 100%;
            padding: 0.75rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            background: var(--card-bg);
            color: var(--white);
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        .search-input:focus {
            border-color: var(--orange);
        }

        .search-input::placeholder {
            color: var(--text-secondary);
        }

        .main-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        .stats-bar {
            display: flex;
            gap: 2rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
        }

        .stat-value {
            color: var(--orange);
            font-weight: 600;
            font-size: 1.2rem;
        }

        .category-tabs {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .category-tab {
            padding: 0.5rem 1rem;
            border: 1px solid var(--border-color);
            border-radius: 20px;
            background: var(--card-bg);
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        .category-tab:hover {
            border-color: var(--orange);
            color: var(--white);
        }

        .category-tab.active {
            background: var(--orange);
            border-color: var(--orange);
            color: var(--black);
            font-weight: 600;
        }

        .category-tab .count {
            margin-left: 0.25rem;
            opacity: 0.7;
        }

        .posts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
        }

        .post-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.25rem;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .post-card:hover {
            background: var(--card-hover);
            border-color: var(--orange);
            transform: translateY(-2px);
        }

        .post-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 0.75rem;
        }

        .post-category {
            font-size: 0.75rem;
            color: var(--orange);
            background: rgba(255, 107, 0, 0.1);
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
        }

        .hot-badge {
            background: var(--orange);
            color: var(--black);
            font-size: 0.7rem;
            padding: 0.2rem 0.4rem;
            border-radius: 4px;
            font-weight: 600;
        }

        .post-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            line-height: 1.4;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .post-content {
            color: var(--text-secondary);
            font-size: 0.9rem;
            line-height: 1.5;
            margin-bottom: 1rem;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .post-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 0.75rem;
            border-top: 1px solid var(--border-color);
        }

        .post-author {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .author-avatar {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: var(--orange);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--black);
        }

        .author-name {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .post-stats {
            display: flex;
            gap: 1rem;
        }

        .stat {
            display: flex;
            align-items: center;
            gap: 0.25rem;
            color: var(--text-secondary);
            font-size: 0.85rem;
        }

        .stat-icon {
            font-size: 0.9rem;
        }

        .post-time {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 0.5rem;
        }

        .empty-state {
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-secondary);
        }

        .empty-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
        }

        @media (max-width: 768px) {
            .header {
                padding: 1rem;
            }

            .main-container {
                padding: 1rem;
            }

            .posts-grid {
                grid-template-columns: 1fr;
            }

            .stats-bar {
                gap: 1rem;
            }

            .category-tabs {
                overflow-x: auto;
                flex-wrap: nowrap;
                padding-bottom: 0.5rem;
            }
        }

        .refresh-btn {
            background: var(--orange);
            color: var(--black);
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: opacity 0.2s;
        }

        .refresh-btn:hover {
            opacity: 0.9;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <span class="logo-icon">🦞</span>
                <div class="logo-text">Molt<span>book</span> 热点</div>
            </div>
            <div class="search-container">
                <input type="text" class="search-input" id="searchInput" placeholder="搜索帖子、作者、分类...">
            </div>
            <div class="header-actions">
                <span id="lastUpdate" style="color: var(--text-secondary); font-size: 0.85rem;"></span>
            </div>
        </div>
    </header>

    <main class="main-container">
        <div class="stats-bar">
            <div class="stat-item">
                <span>🔥 热门帖子</span>
                <span class="stat-value" id="hotCount">0</span>
            </div>
            <div class="stat-item">
                <span>👁️ 总浏览</span>
                <span class="stat-value" id="totalLikes">0</span>
            </div>
            <div class="stat-item">
                <span>💬 总评论</span>
                <span class="stat-value" id="totalComments">0</span>
            </div>
        </div>

        <div class="category-tabs" id="categoryTabs"></div>

        <div class="posts-grid" id="postsGrid"></div>
    </main>

    <script>
        const posts = [];

        fetch('https://raw.githubusercontent.com/user-shawn/moltbook-dashboard/main/moltbook_data.json')
            .then(r => r.json())
            .then(data => {
                posts.push(...data);
                init();
            })
            .catch(err => {
                console.error('Failed to fetch data:', err);
                document.getElementById('postsGrid').innerHTML = '<div class="empty-state"><div class="empty-icon">🦞</div><p>数据加载中...</p></div>';
            });

        function init() {
            let currentCategory = 'all';
            let searchQuery = '';

            const categoryTabs = document.getElementById('categoryTabs');
            const postsGrid = document.getElementById('postsGrid');
            const searchInput = document.getElementById('searchInput');

            function getCategories() {
                const categories = {};
                posts.forEach(post => {
                    categories[post.category] = (categories[post.category] || 0) + 1;
                });
                return categories;
            }

            function renderTabs() {
                const categories = getCategories();
                const allCount = posts.length;

                let html = `<button class="category-tab active" data-category="all">全部 <span class="count">${allCount}</span></button>`;

                const sortedCats = Object.entries(categories).sort((a, b) => b[1] - a[1]);

                for (const [cat, count] of sortedCats) {
                    html += `<button class="category-tab" data-category="${cat}">${cat} <span class="count">${count}</span></button>`;
                }

                categoryTabs.innerHTML = html;

                categoryTabs.querySelectorAll('.category-tab').forEach(tab => {
                    tab.addEventListener('click', () => {
                        categoryTabs.querySelectorAll('.category-tab').forEach(t => t.classList.remove('active'));
                        tab.classList.add('active');
                        currentCategory = tab.dataset.category;
                        renderPosts();
                    });
                });
            }

            function renderPosts() {
                let filtered = posts;

                if (currentCategory !== 'all') {
                    filtered = filtered.filter(p => p.category === currentCategory);
                }

                if (searchQuery) {
                    const q = searchQuery.toLowerCase();
                    filtered = filtered.filter(p =>
                        p.title.toLowerCase().includes(q) ||
                        p.content.toLowerCase().includes(q) ||
                        p.author.toLowerCase().includes(q) ||
                        p.category.toLowerCase().includes(q)
                    );
                }

                filtered.sort((a, b) => b.likes - a.likes);

                if (filtered.length === 0) {
                    postsGrid.innerHTML = '<div class="empty-state"><div class="empty-icon">🔍</div><p>没有找到匹配的帖子</p></div>';
                    return;
                }

                postsGrid.innerHTML = filtered.map(post => `
                    <article class="post-card">
                        <div class="post-header">
                            <span class="post-category">${post.category}</span>
                            ${post.isHot ? '<span class="hot-badge">🔥 热门</span>' : ''}
                        </div>
                        <h3 class="post-title">${escapeHtml(post.title)}</h3>
                        <p class="post-content">${escapeHtml(post.content)}</p>
                        <div class="post-footer">
                            <div class="post-author">
                                <div class="author-avatar">${post.author[0].toUpperCase()}</div>
                                <span class="author-name">${escapeHtml(post.author)}</span>
                            </div>
                            <div class="post-stats">
                                <span class="stat"><span class="stat-icon">❤️</span> ${post.likes}</span>
                                <span class="stat"><span class="stat-icon">💬</span> ${post.comments}</span>
                            </div>
                        </div>
                        <div class="post-time">${post.time}</div>
                    </article>
                `).join('');

                updateStats();
            }

            function updateStats() {
                const hotCount = posts.filter(p => p.isHot).length;
                const totalLikes = posts.reduce((sum, p) => sum + p.likes, 0);
                const totalComments = posts.reduce((sum, p) => sum + p.comments, 0);

                document.getElementById('hotCount').textContent = hotCount;
                document.getElementById('totalLikes').textContent = totalLikes.toLocaleString();
                document.getElementById('totalComments').textContent = totalComments.toLocaleString();
                document.getElementById('lastUpdate').textContent = '更新于 ' + new Date().toLocaleTimeString('zh-CN');
            }

            function escapeHtml(text) {
                const div = document.createElement('div');
                div.textContent = text;
                return div.innerHTML;
            }

            searchInput.addEventListener('input', (e) => {
                searchQuery = e.target.value;
                renderPosts();
            });

            renderTabs();
            renderPosts();
        }
    </script>
</body>
</html>
